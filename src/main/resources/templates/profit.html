<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>収支確認</title>


<style>

body{

    font-family:sans-serif;
    margin:20px;

}


h1{

    color:#2E7D32;

}


.summary{

    background:#f1f8e9;

    padding:15px;

    border-radius:8px;

    margin-bottom:20px;

}


.profit{

    font-size:28px;

    font-weight:bold;

    color:#2E7D32;

}



table{

    width:100%;

    border-collapse:collapse;

    margin-top:20px;

}


th,td{

    border:1px solid #ccc;

    padding:8px;

}


th{

    background:#eeeeee;

}



.back{

    display:inline-block;

    margin-top:20px;

    background:#555;

    color:white;

    padding:10px;

    text-decoration:none;

    border-radius:5px;

}




@media screen and (max-width:600px){


body{

    font-size:18px;

    margin:15px;

}


h1{

    font-size:28px;

}


.summary{

    font-size:20px;

}


table{

    font-size:14px;

}



th,td{

    padding:8px;

}



.back{

    width:100%;

    text-align:center;

    box-sizing:border-box;

}



}


</style>


</head>


<body>


<h1>📊 収支確認</h1>



<div class="summary">


<p>
売上合計：
<span th:text="${salesTotal}">
</span>
円
</p>



<p>
経費合計：
<span th:text="${expenseTotal}">
</span>
円
</p>



<p class="profit">

利益：
<span th:text="${profit}">
</span>
円

</p>


</div>





<h2>📈 売上一覧</h2>


<table>


<tr>

<th>日付</th>
<th>作物</th>
<th>金額</th>
<th>メモ</th>

</tr>



<tr th:each="s:${sales}">


<td th:text="${s.date}"></td>

<td th:text="${s.crop}"></td>

<td th:text="${s.amount}"></td>

<td th:text="${s.memo}"></td>


</tr>


</table>





<h2>💰 経費一覧</h2>


<table>


<tr>

<th>日付</th>
<th>項目</th>
<th>金額</th>
<th>メモ</th>

</tr>



<tr th:each="e:${expenses}">


<td th:text="${e.date}"></td>

<td th:text="${e.category}"></td>

<td th:text="${e.amount}"></td>

<td th:text="${e.memo}"></td>


</tr>


</table>




<a class="back" href="/management">

経営管理へ戻る

</a>



</body>

</html>
