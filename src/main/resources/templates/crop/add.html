<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>農業管理システム | 作物登録</title>

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<header class="top-header">

    <a href="/" class="logo-area">

        <div class="logo-icon">
            🌱
        </div>

        <div>

            <h1>農業管理システム</h1>

            <p>Smart Farm Management</p>

        </div>

    </a>

</header>

<main class="calendar-page">

<div class="back-home">

    <a href="/">🏠 トップページへ戻る</a>

</div>

<section class="calendar-header">

<h2>🌱 作物登録</h2>

<p>作物情報を登録します</p>

</section>

<div class="modal-content">

<form

th:action="@{/crop/save}"
th:object="${crop}"
method="post">
<input type="hidden" th:field="*{id}">
<label>作物名</label>

<input
type="text"
th:field="*{cropName}"
required>

<label>品種</label>

<input
type="text"
th:field="*{variety}">

<label>圃場</label>

<input
type="text"
th:field="*{fieldName}">

<label>植付日</label>

<input
type="date"
th:field="*{plantingDate}">

<label>収穫予定日</label>

<input
type="date"
th:field="*{harvestDate}">

<label>面積(a)</label>

<input
type="number"
step="0.1"
th:field="*{area}">

<label>状態</label>

<select th:field="*{status}">

<option value="栽培準備">
栽培準備
</option>

<option value="植付">
植付
</option>

<option value="生育中">
生育中
</option>

<option value="収穫待ち">
収穫待ち
</option>

<option value="収穫済">
収穫済
</option>

</select>

<br>

<button
type="submit"
id="saveBtn">

保存

</button>

<button
type="button"
onclick="location.href='/crop'">

一覧へ戻る

</button>

</form>

</div>

</main>

</body>

</html>
