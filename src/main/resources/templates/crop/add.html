<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>農業管理システム | 作物登録</title>


<link rel="stylesheet" th:href="@{/css/style.css}">

</head>


<body>



<header class="top-header">


<a href="/" class="logo-area">


<div class="logo-icon">

🌱

</div>


<div>

<h1>
農業管理システム
</h1>


<p>
Smart Farm Management
</p>


</div>


</a>


</header>





<main class="calendar-page">



<section class="calendar-header">


<h2>
🌱 作物登録
</h2>


<p>
新しい作物を登録します
</p>


</section>






<section class="modal-content">


<form action="/crop/save"
      method="post"
      th:object="${crop}">





<label>
作物名
</label>

<input type="text"
       th:field="*{cropName}"
       placeholder="例：さつまいも">






<label>
品種
</label>

<input type="text"
       th:field="*{variety}"
       placeholder="例：紅はるか">






<label>
植付日
</label>

<input type="date"
       th:field="*{plantingDate}">






<label>
収穫予定日
</label>

<input type="date"
       th:field="*{harvestDate}">






<label>
圃場（ほじょう）
</label>

<input type="text"
       th:field="*{fieldName}"
       placeholder="例：第1圃場">






<label>
状態
</label>


<select th:field="*{status}">


<option value="予定">
予定
</option>


<option value="植付済">
植付済
</option>


<option value="生育中">
生育中
</option>


<option value="収穫済">
収穫済
</option>


</select>







<label>
メモ
</label>


<textarea
th:field="*{memo}"
placeholder="肥料・天候・作業メモ">

</textarea>







<button id="saveBtn"
type="submit">

保存

</button>





<div style="margin-top:15px; display:flex; gap:10px; flex-wrap:wrap;">


<a href="/crop"
class="month-button">

🌱 作物一覧

</a>



<a href="/"
class="month-button">

🏠 ホームへ戻る

</a>


</div>




</form>


</section>






</main>



</body>


</html>
