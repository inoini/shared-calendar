<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>農業管理システム | 作物管理</title>


<link rel="stylesheet" th:href="@{/css/style.css}">


</head>


<body>


<header class="top-header">


<a href="/" class="logo-area">


<div class="logo-icon">

🌱

</div>


<div>

<h1>
農業管理システム
</h1>


<p>
Smart Farm Management
</p>


</div>


</a>


</header>





<main class="calendar-page">



<section class="calendar-header">


<h2>
🌱 作物管理
</h2>


<p>
作物の登録・管理を行います
</p>



</section>






<div style="margin-bottom:20px; display:flex; gap:10px; flex-wrap:wrap;">


<a href="/crop/add" class="month-button">

＋ 作物登録

</a>



<a href="/" class="month-button">

🏠 ホームへ戻る

</a>


</div>








<section class="calendar-wrapper">


<table class="calendar-table">


<thead>

<tr>

<th>
作物名
</th>


<th>
品種
</th>


<th>
植付日
</th>


<th>
収穫予定
</th>


<th>
圃場
</th>


<th>
状態
</th>


</tr>

</thead>




<tbody>



<tr th:each="crop:${crops}">


<td th:text="${crop.cropName}">
</td>


<td th:text="${crop.variety}">
</td>


<td th:text="${crop.plantingDate}">
</td>


<td th:text="${crop.harvestDate}">
</td>


<td th:text="${crop.fieldName}">
</td>


<td th:text="${crop.status}">
</td>



</tr>



</tbody>


</table>


</section>






</main>



</body>


</html>
