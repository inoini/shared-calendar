<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>圃場登録</title>

<style>

body {
    font-family: sans-serif;
    margin: 20px;
}

h1 {
    color: #2E7D32;
}

.form-area {
    max-width: 400px;
}

label {
    display: block;
    margin-top: 15px;
}

input, textarea {
    width: 100%;
    padding: 8px;
    box-sizing: border-box;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
}


a {
    display: inline-block;
    margin-top: 20px;
    text-decoration: none;
}

.home-button {
    background: #555;
    color: white !important;
    padding: 8px 15px;
    border-radius: 5px;
    text-decoration: none;
}
</style>

</head>


<body>


<h1>圃場登録</h1>


<div class="form-area">


<form th:action="@{/field/save}"
      th:object="${field}"
      method="post">


<label>
圃場名
</label>

<input type="text"
       th:field="*{name}">


<label>
場所
</label>

<input type="text"
       th:field="*{location}">
<label>
緯度
</label>

<input type="number"
       step="0.000001"
       th:field="*{latitude}">


<label>
経度
</label>

<input type="number"
       step="0.000001"
       th:field="*{longitude}">

<label>
面積(a)
</label>

<input type="number"
       step="0.1"
       th:field="*{area}">


<label>
作物
</label>

<input type="text"
       th:field="*{cropName}">


<label>
メモ
</label>

<textarea rows="5"
          th:field="*{memo}">
</textarea>


<button type="submit">
保存
</button>


</form>

<a class="home-button" href="/field">
圃場一覧へ戻る
</a>

<br>

<a class="home-button" href="/">
トップへ戻る
</a>
</div>


</body>

</html>
