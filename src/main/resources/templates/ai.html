<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">


<title>AI農業アシスタント</title>


<style>


body{

font-family:sans-serif;

margin:20px;

}


h1{

color:#2E7D32;

}



textarea{

width:100%;

height:120px;

padding:10px;

font-size:16px;

box-sizing:border-box;

}



button{

margin-top:10px;

padding:12px 20px;

background:#2E7D32;

color:white;

border:none;

border-radius:5px;

font-size:18px;

}



.answer{

margin-top:20px;

padding:15px;

background:#f2f2f2;

border-radius:10px;

white-space:pre-wrap;

}



.back{

display:inline-block;

margin-top:20px;

background:#555;

color:white;

padding:10px 15px;

text-decoration:none;

border-radius:5px;

}


</style>


</head>


<body>


<h1>
🤖 AI農業アシスタント
</h1>



<form action="/ai" method="post">


<textarea name="question"
placeholder="質問を入力してください"
th:text="${question}">
</textarea>



<br>


<button type="submit">
AIに質問する
</button>



</form>





<div class="answer"
th:if="${answer}">


<h2>
AI回答
</h2>


<p th:text="${answer}"></p>


</div>





<a class="back" href="/">
トップへ戻る
</a>


</body>

</html>
