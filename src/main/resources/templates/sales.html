<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>売上管理</title>


<style>

body{
    font-family:sans-serif;
    margin:20px;
}


h1{
    color:#2E7D32;
}


input,textarea{

    width:100%;
    padding:8px;
    margin-bottom:10px;
    box-sizing:border-box;

}


button{

    padding:10px 20px;

    background:#4CAF50;

    color:white;

    border:none;

    border-radius:5px;

}



table{

    margin-top:30px;

    border-collapse:collapse;

    width:100%;

}


td,th{

    border:1px solid #ccc;

    padding:8px;

}



/* 戻るボタン */

.back{

    display:inline-block;

    margin-top:20px;

    background:#555;

    color:white;

    padding:10px;

    text-decoration:none;

    border-radius:5px;

}



/* 編集・削除ボタン */

.edit,
.delete{

    display:inline-block;

    padding:8px 12px;

    color:white;

    text-decoration:none;

    border-radius:5px;

    margin:3px;

}


.edit{

    background:#1976D2;

}


.delete{

    background:#D32F2F;

}



/* スマホ対応 */

@media screen and (max-width:600px){


body{

    font-size:18px;

    margin:15px;

}



h1{

    font-size:28px;

}


h2{

    font-size:22px;

}



input,
textarea{

    font-size:18px;

    padding:12px;

}



button{

    width:100%;

    font-size:20px;

    padding:14px;

    margin-top:10px;

}



table{

    font-size:16px;

}



th,
td{

    padding:10px;

}



.edit,
.delete{

    font-size:18px;

    padding:12px 15px;

}



.back{

    width:100%;

    text-align:center;

    box-sizing:border-box;

    font-size:18px;

    padding:12px;

}


}


</style>


</head>


<body>


<h1>📈 売上管理</h1>



<form th:action="@{/sales/add}"
      th:object="${sale}"
      method="post">


日付

<input type="date"
       th:field="*{date}">



作物

<input type="text"
       th:field="*{crop}"
       placeholder="さつまいも">



売上金額

<input type="number"
       th:field="*{amount}">



メモ

<textarea th:field="*{memo}">
</textarea>



<button type="submit">
登録
</button>


</form>



<h2>売上一覧</h2>



<table>


<tr>

<th>日付</th>

<th>作物</th>

<th>金額</th>

<th>メモ</th>

<th>操作</th>

</tr>



<tr th:each="s:${sales}">


<td th:text="${s.date}"></td>

<td th:text="${s.crop}"></td>

<td th:text="${s.amount} + '円'"></td>

<td th:text="${s.memo}"></td>


<td>


<a class="edit"
th:href="@{/sales/edit/{id}(id=${s.id})}">
編集
</a>


<a class="delete"
th:href="@{/sales/delete/{id}(id=${s.id})}"
onclick="return confirm('削除しますか？');">
削除
</a>


</td>


</tr>


</table>




<a class="back" href="/management">

経営管理へ戻る

</a>



</body>

</html>
