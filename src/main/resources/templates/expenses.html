<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>経費管理</title>


<style>


body{
    font-family:sans-serif;
    margin:20px;
}


h1{
    color:#2E7D32;
}



input,
textarea,
select{

    width:100%;
    padding:8px;
    margin-bottom:10px;
    box-sizing:border-box;

}



button{

    padding:10px 20px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;

}



table{

    margin-top:30px;
    border-collapse:collapse;
    width:100%;

}


th,
td{

    border:1px solid #ccc;
    padding:8px;

}



/* 編集ボタン */

.edit{

    display:inline-block;
    padding:8px 12px;
    background:#1976D2;
    color:white;
    text-decoration:none;
    border-radius:5px;
    margin:3px;

}



/* 削除ボタン */

.delete{

    display:inline-block;
    padding:8px 12px;
    background:#D32F2F;
    color:white;
    text-decoration:none;
    border-radius:5px;
    margin:3px;

}



/* 戻るボタン */

.back{

    display:inline-block;
    margin-top:20px;
    background:#555;
    color:white;
    padding:10px 15px;
    text-decoration:none;
    border-radius:5px;

}



/* スマホ対応 */

@media screen and (max-width:600px){


body{

    font-size:18px;
    margin:15px;

}


h1{

    font-size:28px;

}



input,
textarea,
select{

    font-size:18px;
    padding:12px;

}



button{

    width:100%;
    font-size:20px;
    padding:14px;

}



.edit,
.delete{

    font-size:16px;
    padding:10px 14px;

}



.back{

    display:inline-block;
    margin-top:20px;
    background:#555;
    color:white;
    padding:10px 15px;
    text-decoration:none;
    border-radius:5px;

}



table{

    font-size:16px;

}


}

</style>


</head>


<body>


<h1>💰 経費管理</h1>



<form th:action="@{/expenses/add}"
      th:object="${expense}"
      method="post">


日付

<input type="date"
       th:field="*{date}">



項目


<select th:field="*{category}">

<option value="">
選択してください
</option>

<option value="肥料">
肥料
</option>

<option value="農薬">
農薬
</option>

<option value="燃料">
燃料
</option>

<option value="資材">
資材
</option>

<option value="機械">
機械
</option>

<option value="その他">
その他
</option>

</select>




金額

<input type="number"
       th:field="*{amount}">



メモ

<textarea th:field="*{memo}">
</textarea>




<button type="submit">

登録

</button>


</form>




<h2>経費一覧</h2>



<table>


<tr>

<th>日付</th>

<th>項目</th>

<th>金額</th>

<th>メモ</th>

<th>操作</th>

</tr>



<tr th:each="expense:${expenses}">


<td th:text="${expense.date}"></td>


<td th:text="${expense.category}"></td>


<td th:text="${expense.amount} + '円'"></td>


<td th:text="${expense.memo}"></td>



<td>


<a class="edit"
th:href="@{/expenses/edit/{id}(id=${expense.id})}">
編集
</a>



<a class="delete"
th:href="@{/expenses/delete/{id}(id=${expense.id})}"
onclick="return confirm('削除しますか？');">
削除
</a>


</td>


</tr>


</table>




<a class="back" href="/management">

経営管理へ戻る

</a>



</body>

</html>
