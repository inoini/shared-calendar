<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>農業管理システム</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2E7D32">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<link rel="stylesheet" th:href="@{/css/style.css}">

<script defer th:src="@{/js/script.js}"></script>

</head>

<body>

<header class="header">

    <h1>🌱 農業管理システム</h1>

    <p>Smart Farm Management</p>

</header>

<main class="container">

    <section class="welcome">

        <h2>ようこそ</h2>

        <p>
            作業予定・圃場・作物・経営情報を
            一元管理できる農業管理システムです。
        </p>

    </section>

    <section class="card-area">

        <a th:href="@{/calendar}" class="card">

            <div class="card-title">

                <span>📅 作業カレンダー</span>

                <span class="arrow">›</span>

            </div>

            <div class="card-text">

                作業予定・担当者・圃場・作業記録を管理します。

            </div>

        </a>

        <a th:href="@{/crop}" class="card">

            <div class="card-title">

                <span>🌱 作物管理</span>

                <span class="arrow">›</span>

            </div>

            <div class="card-text">

                品種・植付・収穫予定・生育状況を管理します。

            </div>

        </a>

        <a th:href="@{/field}" class="card">

            <div class="card-title">

                <span>🚜 圃場管理</span>

                <span class="arrow">›</span>

            </div>

            <div class="card-text">

                圃場情報・面積・利用状況を管理します。

            </div>

        </a>

        <a th:href="@{/management}" class="card">

            <div class="card-title">

                <span>📊 経営管理</span>

                <span class="arrow">›</span>

            </div>

            <div class="card-text">

                売上・経費・利益など経営状況を管理します。

            </div>

        </a>

    </section>

</main>
<!-- AI農業アシスタント -->

<div class="ai-link">

    <a href="/ai">
        🤖 AI農業アシスタント
    </a>

</div>
<footer class="footer">

    Version 1.0

</footer>

</body>

</html>
