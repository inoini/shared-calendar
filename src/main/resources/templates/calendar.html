<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>農業管理システム | 作業カレンダー</title>

<meta name="theme-color" content="#2E7D32">

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<link rel="stylesheet" th:href="@{/css/style.css}">

<script defer th:src="@{/js/script.js}"></script>

</head>

<body>

<header class="top-header">

    <div class="logo-area">

        <div class="logo-icon">
            🌱
        </div>

        <div>

            <h1>
                農業管理システム
            </h1>

            <p>
                Smart Farm Management
            </p>

        </div>

    </div>

</header>

<main class="calendar-page">

<section class="calendar-header">

    <div>

        <h2>
            📅 作業カレンダー
        </h2>

        <p>
            作業予定・担当者・圃場・作物を一元管理
        </p>

    </div>

</section>

<section class="month-nav">

    <a class="month-button"
       th:href="@{/calendar(year=${prevYear},month=${prevMonth})}">

        ← 前月

    </a>

    <div class="month-title">

        <span th:text="${year}"></span>年

        <span th:text="${month}"></span>月

    </div>

    <a class="month-button"
       th:href="@{/calendar(year=${nextYear},month=${nextMonth})}">

        次月 →

    </a>

</section>





<section class="calendar-wrapper">

<table class="calendar-table">

<thead>

<tr>

    <th class="sun">日</th>
    <th>月</th>
    <th>火</th>
    <th>水</th>
    <th>木</th>
    <th>金</th>
    <th class="sat">土</th>

</tr>

</thead>

<tbody>





<tr th:each="week : ${#numbers.sequence(0,5)}">



<td

th:each="day : ${#numbers.sequence(0,6)}"

th:with="idx=${week*7+day}">





<div th:if="${idx < calendarDays.size()}">



<div class="day-box"

th:data-date="${calendarDays[idx].date}"

onclick="openModal(this.dataset.date)">



<div class="day-number"

th:text="${calendarDays[idx].day}">

</div>





<div th:each="schedule : ${calendarDays[idx].scheduleList}"
     class="schedule-card">

    <div class="schedule-time">

        <span th:text="${schedule.time}"></span>

    </div>

    <div class="schedule-work">

       <span th:text="${schedule.workType}"></span>
        

    </div>

    <div class="schedule-info">

        <span class="crop">

            🌱 <span th:text="${schedule.cropName}"></span>

        </span>

        <span class="field">

            🚜 <span th:text="${schedule.fieldName}"></span>

        </span>

    </div>

    <div class="schedule-user">

        👤 <span th:text="${schedule.userName}"></span>

    </div>

</div>


</div>



</div>



</td>



</tr>



</table>
</section>
<!-- モーダル -->

<div id="modal" class="modal">


    <div class="modal-content">


        <h2 id="selectedDate"></h2>



        <!-- 保存済み予定一覧 -->

        <div id="scheduleList">

            読み込み中...

        </div>




        <form id="scheduleForm" action="/save" method="post">


            <!-- 編集用ID -->

            <input type="hidden" 
                   id="scheduleId" 
                   name="id">



            <!-- 日付 -->

            <input type="hidden" 
                   id="date" 
                   name="date">





            <!-- 時間 -->

            <select id="time" name="time">

            </select>





            <!-- ユーザー -->

            <select name="userName">


                <option value="優生">
                   優生 
                </option>


                <option value="このか">
                   このか
                </option>


                <option value="正幸">
                   正幸
                   
               
                </option>


                <option value="瑞恵">
                   
                    瑞恵
                    
                </option>


            </select>





            <!-- 内容 -->

            <textarea

                name="schedule"

                placeholder="予定を入力"

                required>

            </textarea>
			<!-- 圃場名 -->

<input
type="text"
name="fieldName"
placeholder="圃場名">


<!-- 作物名 -->

<input
type="text"
name="cropName"
placeholder="作物名（例：さつまいも）">


<!-- 作業種類 -->

<input
type="text"
name="workType"
placeholder="作業内容（例：植付・収穫・除草）">


<!-- メモ -->

<textarea
name="memo"
placeholder="メモ">
</textarea>



            <br>




            <!-- 保存・更新ボタン -->

            <button 
                id="saveBtn"
                type="submit">

                保存

            </button>





            <!-- 削除ボタン -->

            <button

                id="deleteBtn"

                type="button"

                style="display:none;"

                onclick="deleteSchedule()">


                削除


            </button>





            <!-- 閉じる -->

            <button

                type="button"

                onclick="closeModal()">


                閉じる


            </button>



        </form>



    </div>


</div>

</body>
</html>
